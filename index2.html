<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npn/quill@2.0.3/dist/quill.snow.css">

</head>
<body>
    <div name="business_summary" id="editor" contenteditable="true"></div>

<script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>
<script>
    const toolBarOptions = [
        ['bold', 'italic'],
        ['link'], 
        [{'header': [1,2,3,4,5,6,false]}],
        [{'list': 'ordered'}, {'list': 'bullet'}, {'list': 'check'}]
    ]

    const quill = new Quill("#business_summary", {
        modules: {
            toolBar: toolBarOptions
        }, 
        theme: 'snow'
    })
</script>
</body>
</html>
